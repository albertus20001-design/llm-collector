name: pricing-snapshot

on:
  schedule:
    - cron: '15 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh pricing snapshot
        run: node scripts/update-pricing.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- data/claude/pricing-snapshot.md data/openai/pricing-snapshot.md; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/claude/pricing-snapshot.md data/openai/pricing-snapshot.md
          git commit -m "chore: update pricing snapshot"
          git push
